<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap — C+D Combined Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #111827;
    padding: 24px 16px 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 { color: white; font-size: 17px; font-weight: 800; margin-bottom: 4px; text-align: center; }
  .subtitle { color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 24px; text-align: center; }

  /* Simulate the real journey card */
  .journey-card {
    background: linear-gradient(135deg, #0D47A1, #1565C0, #0277BD);
    border-radius: 20px;
    padding: 16px;
    width: 100%;
    max-width: 420px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    margin-bottom: 14px;
  }
  .card-header-label {
    font-size: 10px; font-weight: 800;
    letter-spacing: .8px; color: rgba(255,255,255,0.7);
  }
  .card-header-pts {
    font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.85);
  }
  .card-header-pts span { color: rgba(255,255,255,0.4); }

  /* ─── Timeline container ─── */
  .timeline {
    position: relative;
    padding-left: 0;
  }

  /* ─── Phase chapter marker ─── */
  .phase-chapter {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 2px;
    position: relative;
  }
  /* The vertical line segment above the chapter chip */
  .phase-chapter .line-above {
    width: 2px;
    flex-shrink: 0;
    margin-left: 14px; /* centers on 30px dot column */
    border-radius: 2px;
  }
  .phase-chapter .chapter-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    border-radius: 20px;
    padding: 4px 11px 4px 8px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .3px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .phase-chapter .chapter-chip .chip-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  /* Spacer line to the right of chip — fills remaining width */
  .phase-chapter .line-right {
    flex: 1;
    height: 2px;
    border-radius: 2px;
    margin-left: 6px;
  }

  /* ─── Stop row ─── */
  .stop-row {
    display: flex;
    align-items: stretch;
    gap: 0;
  }
  .stop-row .dot-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 30px;
    flex-shrink: 0;
  }
  .stop-row .dot-col .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .stop-row .dot-col .dot.current {
    width: 18px; height: 18px;
    margin-top: 2px;
    animation: pulse 2s ease-in-out infinite;
  }
  .stop-row .dot-col .dot.small {
    width: 10px; height: 10px;
    margin-top: 6px;
  }
  .stop-row .dot-col .seg-line {
    width: 2px;
    flex: 1;
    min-height: 8px;
    border-radius: 1px;
    margin-top: 3px;
  }
  .stop-row .text-col {
    flex: 1;
    padding: 2px 4px 12px 6px;
    min-width: 0;
  }
  .stop-row .text-col .row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .stop-row .text-col .stop-name {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.25;
  }
  .stop-row .text-col .stop-desc {
    font-size: 10px;
    margin-top: 2px;
    line-height: 1.4;
  }
  .stop-row .text-col .progress-wrap {
    margin-top: 6px;
  }
  .stop-row .text-col .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  .stop-row .text-col .progress-fill {
    height: 100%;
    border-radius: 2px;
  }
  .stop-row .text-col .progress-label {
    font-size: 9px;
    margin-top: 3px;
    color: rgba(255,255,255,0.45);
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(255,230,60,0.2), 0 0 8px 2px rgba(255,230,60,0.5); }
    50%      { box-shadow: 0 0 0 5px rgba(255,230,60,0.12), 0 0 16px 5px rgba(255,230,60,0.8); }
  }
</style>
</head>
<body>

<h1>📍 Combined C + D Prototype</h1>
<p class="subtitle">Phase chapter markers · Vertical timeline · Gradient progress bar</p>

<div class="journey-card">
  <div class="card-header">
    <div class="card-header-label">JOURNEY ROADMAP</div>
    <div class="card-header-pts">2,450 <span>/ 25,000 pts</span></div>
  </div>
  <div class="timeline" id="roadmap"></div>
</div>

<script>
const FAM_PTS = 2450;

const PHASES = [
  {
    id: 'pretrip',
    label: 'Pre-Trip & Flight',
    emoji: '✈️',
    col: '#29B6F6',
    stops: [
      { id:'phoenix',   emoji:'🌵', label:'Phoenix',      threshold:0,     desc:'The summer adventure begins!' },
      { id:'off',       emoji:'✈️', label:"We're Off!",   threshold:6500,  desc:'Wheels up — the Ortiz family is on the move!' },
    ]
  },
  {
    id: 'vancouver',
    label: 'Vancouver & Boarding',
    emoji: '🏙️',
    col: '#4ECDC4',
    stops: [
      { id:'vancouver', emoji:'🏔️', label:'Vancouver',    threshold:8500,  desc:'4 days exploring Vancouver before boarding.' },
      { id:'aboard',    emoji:'🚢', label:'All Aboard!',  threshold:10000, desc:"Welcome to the Disney Wonder — let's sail!" },
    ]
  },
  {
    id: 'cruise',
    label: 'Alaska Cruise',
    emoji: '⚓',
    col: '#00BCD4',
    stops: [
      { id:'skagway',   emoji:'⚓', label:'Skagway',      threshold:10500, desc:'Lynn Canal & gold rush country — just 500 pts from boarding!' },
      { id:'juneau',    emoji:'🦅', label:'Juneau',       threshold:11000, desc:"Alaska's capital — bald eagles, glaciers, 500 more pts!" },
      { id:'ketchikan', emoji:'🐟', label:'Ketchikan',    threshold:11500, desc:'Salmon capital — last Alaskan port, 500 pts from Juneau!' },
    ]
  },
  {
    id: 'home',
    label: 'Homeward Bound',
    emoji: '🏠',
    col: '#FFA726',
    stops: [
      { id:'home',      emoji:'🏠', label:'Back to Phoenix', threshold:12500, desc:'Cruise complete — flying back to Phoenix!' },
      { id:'school',    emoji:'🎒', label:'Back to School',  threshold:25000, desc:'12,500 pts to go — the big home-stretch push! 🏆' },
    ]
  },
];

// Flatten stops to find current/next
const ALL_STOPS = PHASES.flatMap(p => p.stops);
const curStop   = [...ALL_STOPS].reverse().find(s => FAM_PTS >= s.threshold) || ALL_STOPS[0];
const nextStop  = ALL_STOPS.find(s => FAM_PTS < s.threshold);

function stopState(stop) {
  const reached = FAM_PTS >= stop.threshold;
  const isCur   = stop.id === curStop.id;
  const isNext  = nextStop && stop.id === nextStop.id;
  const ptsLeft = Math.max(0, stop.threshold - FAM_PTS);
  const pct     = isCur && nextStop
    ? Math.min(100, Math.round(((FAM_PTS - stop.threshold) / (nextStop.threshold - stop.threshold)) * 100))
    : 0;
  return { reached, isCur, isNext, ptsLeft, pct };
}

function phaseStatus(phase) {
  const allReached = phase.stops.every(s => FAM_PTS >= s.threshold);
  const hasActive  = phase.stops.some(s => {
    const st = stopState(s);
    return st.isCur || st.isNext;
  });
  return { allReached, hasActive };
}

// ── Build HTML ──────────────────────────────────────
let html = '';

PHASES.forEach((phase, pi) => {
  const { allReached, hasActive } = phaseStatus(phase);
  const pc = phase.col;

  // Chapter chip color logic
  let chipBg, chipText, lineCol;
  if (allReached)    { chipBg = pc;                        chipText = '#fff';                  lineCol = pc; }
  else if (hasActive){ chipBg = pc;                        chipText = '#fff';                  lineCol = `${pc}66`; }
  else               { chipBg = 'rgba(255,255,255,0.1)';   chipText = 'rgba(255,255,255,0.4)'; lineCol = 'rgba(255,255,255,0.1)'; }

  // Line above the chapter chip (connecting from previous section)
  const lineAboveCol = pi === 0 ? 'transparent' : lineCol;
  const lineAboveH   = pi === 0 ? '0' : '10px';

  html += `
    <div style="display:flex;flex-direction:column;">
      <!-- Chapter marker -->
      <div style="display:flex;align-items:center;margin-bottom:4px;">
        <div style="width:2px;height:${lineAboveH};background:${lineAboveCol};margin-left:14px;border-radius:1px;flex-shrink:0;"></div>
      </div>
      <div style="display:flex;align-items:center;margin-bottom:6px;">
        <div style="width:30px;flex-shrink:0;display:flex;justify-content:center;">
          <div style="width:8px;height:8px;border-radius:50%;background:${chipBg};box-shadow:${allReached||hasActive?`0 0 0 3px ${pc}33`:'none'};"></div>
        </div>
        <div style="display:flex;align-items:center;gap:5px;background:${chipBg};border-radius:20px;padding:4px 12px 4px 8px;flex-shrink:0;">
          <span style="font-size:12px;line-height:1;">${phase.emoji}</span>
          <span style="color:${chipText};font-size:10px;font-weight:800;letter-spacing:.2px;">${phase.label}</span>
          ${allReached ? `<span style="color:rgba(255,255,255,0.75);font-size:9px;margin-left:2px;">✓</span>` : ''}
        </div>
        <div style="flex:1;height:2px;background:${lineCol};margin-left:8px;border-radius:1px;opacity:0.5;"></div>
      </div>`;

  // Stops within this phase
  phase.stops.forEach((stop, si) => {
    const { reached, isCur, isNext, ptsLeft, pct } = stopState(stop);
    const isLastInPhase = si === phase.stops.length - 1;
    const isVeryLast    = pi === PHASES.length - 1 && isLastInPhase;

    // Dot style
    let dotBg, dotBorder, dotClass, dotShadow;
    if (isCur) {
      dotBg = '#FFE66D'; dotBorder = '2px solid #FFE66D';
      dotClass = 'dot current'; dotShadow = '';
    } else if (reached) {
      dotBg = pc; dotBorder = `2px solid ${pc}`;
      dotClass = 'dot'; dotShadow = `box-shadow:0 0 0 3px ${pc}33;`;
    } else if (isNext) {
      dotBg = 'transparent'; dotBorder = `2px dashed ${pc}`;
      dotClass = 'dot'; dotShadow = '';
    } else {
      dotBg = 'transparent'; dotBorder = '1px solid rgba(255,255,255,0.2)';
      dotClass = 'dot small'; dotShadow = '';
    }

    // Connector line below dot
    const segLineCol = reached && !isVeryLast ? `${pc}BB` : 'rgba(255,255,255,0.1)';

    // Text colors
    const nameCol = isCur ? '#FFE66D' : reached ? 'white' : isNext ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.3)';
    const descCol = isCur ? 'rgba(255,230,60,0.6)' : reached ? 'rgba(255,255,255,0.5)' : isNext ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.18)';

    // Badge
    let badge;
    if (isCur) {
      badge = `<span style="background:#FFE66D;color:#1a1a2e;border-radius:20px;padding:2px 9px;font-size:8px;font-weight:800;white-space:nowrap;box-shadow:0 2px 8px rgba(255,230,60,0.45);">📍 HERE</span>`;
    } else if (reached) {
      badge = `<span style="background:${pc};color:#fff;border-radius:20px;padding:2px 8px;font-size:8px;font-weight:800;">✓</span>`;
    } else if (isNext) {
      badge = `<span style="background:rgba(255,179,71,0.2);color:#FFB347;border:1px solid rgba(255,179,71,0.5);border-radius:20px;padding:2px 8px;font-size:8px;font-weight:700;white-space:nowrap;">🎯 ${ptsLeft.toLocaleString()} pts</span>`;
    } else {
      badge = `<span style="color:rgba(255,255,255,0.25);font-size:9px;">${stop.threshold === 0 ? '—' : stop.threshold.toLocaleString()}</span>`;
    }

    // Gradient progress bar (only on current stop)
    const barHTML = isCur && nextStop ? `
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg, ${pc}, #FFE66D);box-shadow:0 0 6px ${pc}88;"></div>
        </div>
        <div class="progress-label">${pct}% of the way to ${nextStop.label}</div>
      </div>` : '';

    html += `
      <div class="stop-row" style="opacity:${reached||isCur||isNext?1:0.45};">
        <div class="dot-col">
          <div class="${dotClass}" style="background:${dotBg};border:${dotBorder};${dotShadow}"></div>
          ${!isVeryLast ? `<div class="seg-line" style="background:${segLineCol};"></div>` : ''}
        </div>
        <div class="text-col">
          <div class="row-top">
            <span style="font-size:15px;line-height:1.3;margin-right:4px;flex-shrink:0;">${stop.emoji}</span>
            <span class="stop-name" style="color:${nameCol};flex:1;">${stop.label}</span>
            <div style="flex-shrink:0;">${badge}</div>
          </div>
          <div class="stop-desc" style="color:${descCol};">${stop.desc}</div>
          ${barHTML}
        </div>
      </div>`;
  });

  html += `</div>`; // close phase group
});

document.getElementById('roadmap').innerHTML = html;
</script>
</body>
</html>
